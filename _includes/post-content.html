<div class="content">
  <h3 class="title">
    <a href="{{ post.url | relative_url }}" style="color: inherit; text-decoration: none;">{{ post.title }}</a>
  </h3>

  <p class="excerpt">{{ post.lead_text }}</p>

  <a href="{{ post.url | relative_url }}" class="project-link">
    <button class="btn btn-default btn-lg">
      <i class="fa fa-file-text-o fa-lg"></i> View Posts
    </button>
  </a>

  {% if post.tags and post.tags.size > 0 %}
  <div class="tags">
    {% for tag in post.tags %}
    <span>{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}

  </div>
